<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaudeBuddy Widget</title>
  <style>
    body {
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      background: #1f2937;
      color: #f9fafb;
      min-height: 100vh;
      box-sizing: border-box;
    }
    
    .widget-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      height: 100%;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-bottom: 8px;
      border-bottom: 1px solid #374151;
    }
    
    .logo {
      font-size: 16px;
    }
    
    .title {
      font-weight: 600;
      font-size: 13px;
    }
    
    .usage-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }
    
    .usage-label {
      font-size: 11px;
      color: #d1d5db;
    }
    
    .usage-value {
      font-weight: 600;
      font-size: 13px;
    }
    
    .usage-bar {
      width: 100%;
      height: 3px;
      background: #374151;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 2px;
    }
    
    .usage-progress {
      height: 100%;
      border-radius: 999px;
      transition: width 0.3s ease;
    }
    
    .close-btn {
      position: fixed;
      top: 4px;
      right: 4px;
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 3px;
    }
    
    .close-btn:hover {
      background: #374151;
      color: #f9fafb;
    }
  </style>
</head>
<body>
  <button class="close-btn" onclick="window.close()">×</button>
  
  <div class="widget-container">
    <div class="header">
      <div class="logo">🐾</div>
      <div class="title">ClaudeBuddy</div>
    </div>
    
    <div id="usage-container">
      <div class="usage-item" id="loading">
        <span class="usage-label">로딩 중...</span>
      </div>
    </div>
  </div>

  <script src="widget.js"></script>
</body>
</html>
